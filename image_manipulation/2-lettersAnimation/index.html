<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Litter animations</title>
</head>
<body>
    <style> 
        * { margin:0; padding:0; } 

        html, body { 
            width:100%; height:100%; 
            background-color: black;
        } 

        canvas {
            background: #fff;  
            display:block;  
            filter: invert(1);
        }
        .centered {
            width: 100vw;
            margin: auto;
            /* height: 40rem; */
            /* top: 0; */
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 2rem;
        }
        form {
            position: absolute;
            bottom: 0;

        }
    </style>
    <div class="centered">
        <canvas id="canvas_01"  width="1200" height="900"></canvas>
    </div>

    <form action="" method="get">
        <input type="text" name="input" value="o">
        <button type="submit">print</button>
        <button type="reset" onclick="window.resetAnimation()">reset</button>

    </form>

    <script src="../../setup.js"></script>
    <script src="../effects/Effects.js"></script>
    <script src="functions_animations.js"></script>
    <script src="2.js"></script>
</body>
</html>
